<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="Favicon/3-removebg-preview.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | F. Manneh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.1), transparent 50%);
            overflow: hidden;
        }

        .login-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 210, 255, 0.1);
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: inline-block;
            background: rgba(0, 210, 255, 0.1);
            padding: 1rem;
            border-radius: 50%;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .login-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .login-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            background: var(--gradient);
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4);
        }

        #error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            word-wrap: break-word;
        }

        #success-msg {
            color: #34d399;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .auth-toggle {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .login-glass { padding: 2rem 1.5rem; }
            .login-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="login-glass">
        <i class='bx bx-lock-alt login-icon'></i>
        <h1 class="login-title" id="form-title">Admin Portal</h1>
        <p class="login-subtitle" id="form-subtitle">Authenticate to view site analytics.</p>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="input-group">
                <i class='bx bx-envelope'></i>
                <input type="email" id="login-email" class="login-input" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class='bx bx-key'></i>
                <input type="password" id="login-password" class="login-input" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn" id="login-submit-btn">Secure Login</button>
            <p class="auth-toggle">Need an account? <a href="#" id="show-signup">Sign Up</a></p>
        </form>

        <!-- Signup Form (Hidden by default) -->
        <form id="signupForm" style="display: none;">
            <div class="input-group">
                <i class='bx bx-envelope'></i>
                <input type="email" id="signup-email" class="login-input" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class='bx bx-key'></i>
                <input type="password" id="signup-password" class="login-input" placeholder="Create Password" required>
            </div>
            <button type="submit" class="login-btn">Create Account</button>
            <p class="auth-toggle">Already have an account? <a href="#" id="show-login">Login</a></p>
        </form>

        <p id="error-msg"></p>
        <p id="success-msg" style="color: #34d399; font-size: 0.85rem; margin-top: 1rem; display: none;"></p>
    </div>



    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        
        // Load config from our separate file
        // Since it's a static site and we're using modules, we'll just define it here or fetch it.
        // For simplicity, we'll redefine the placeholders here, but the user should ideally 
        // update firebase-config.js and we could import it if we were in a build environment.
        // But here we'll use a direct config for the module script.
        
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');

        // Toggle Views
        document.getElementById('show-signup').addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            formTitle.innerText = "Create Account";
            formSubtitle.innerText = "Join the Francisco Manneh portal.";
            errorMsg.style.display = 'none';
        });

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            signupForm.style.display = 'none';
            loginForm.style.display = 'block';
            formTitle.innerText = "Admin Portal";
            formSubtitle.innerText = "Authenticate to view site analytics.";
            errorMsg.style.display = 'none';
        });

        // Login Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            errorMsg.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Auth observer will handle redirect
            } catch (error) {
                errorMsg.innerText = "Login failed: " + error.message;
                errorMsg.style.display = 'block';
            }
        });

        // Signup Logic
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            errorMsg.style.display = 'none';

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                successMsg.innerText = "Account created successfully! Logging you in...";
                successMsg.style.display = 'block';
            } catch (error) {
                errorMsg.innerText = "Signup failed: " + error.message;
                errorMsg.style.display = 'block';
            }
        });

        // Check Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "dashboard.html";
            }
        });
    </script>
</body>
</html>
